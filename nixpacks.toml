# Root-level nixpacks config for Railway.
#
# WHY aptPkgs here instead of `playwright install --with-deps`:
# `--with-deps` runs apt-get in the BUILD stage of the nixpacks multi-stage
# Docker build. Those .so files are installed to /usr/lib/… which is NOT
# included in the COPY step that carries only /app into the final image.
# aptPkgs declared here are installed into the final runtime image so
# Chromium Headless Shell can actually load its dynamic libraries at runtime.

[phases.setup]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxcb1",
  "libxkbcommon0",
  "libx11-6",
  "libx11-xcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libxi6",
  "libxrender1",
  "libxss1",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libglib2.0-0",
  "libexpat1",
  "libfontconfig1",
  "fonts-liberation",
  "ca-certificates"
]
